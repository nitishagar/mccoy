name: Site

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: site/pnpm-lock.yaml
      - run: uv sync --all-groups
      - run: uv run mccoy --help # ensures gen-cli-ref has input
      - run: uv run pytest tests/test_site_tokens.py -q # D1 token drift guard
      - run: (cd site && pnpm install --frozen-lockfile && pnpm build)
